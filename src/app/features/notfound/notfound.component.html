<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="text-center max-w-lg">

        <!-- Big 404 -->
        <h1 class="text-7xl font-extrabold text-blue-600 mb-4">404</h1>

        <!-- Title -->
        <h2 class="text-2xl font-semibold text-gray-800 mb-2">
            Page Not Found
        </h2>

        <!-- Description -->
        <p class="text-gray-500 mb-6">
            Sorry, the page you are looking for doesn’t exist or has been moved.
        </p>

        <!-- Buttons -->
        <div class="flex justify-center gap-4">

            <!-- Go Home -->
            <a routerLink="/login" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition">
                Go Home
            </a>

            <!-- Go Back -->
            <button onclick="history.back()"
                class="cursor-pointer px-5 py-2.5 border border-gray-300 rounded-lg hover:bg-gray-100 transition">
                Go Back
            </button>

        </div>

    </div>
</div>
